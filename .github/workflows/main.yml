---
name: CI for java project
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  Test_java_code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: setup java version 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: run tests with mvn
        run: mvn test
      - name: build code
        run: mvn package
